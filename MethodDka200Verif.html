<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MethodDka - Ultra High Precision (200桁・検算機能版)</title>
  <style>
    body { font-family: Arial, sans-serif; }
    .container {
      max-width: 650px;
      margin: 0 auto;
      padding: 20px;
      background-color: #f9f9f9;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .input-field { margin-bottom: 10px; }
    .input-field input { width: 100%; padding: 8px; box-sizing: border-box; }
    .button {
      padding: 10px 20px;
      background-color: #0056b3;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .button:disabled { background-color: #ced4da; cursor: not-allowed; }
    .button:hover:not(:disabled) { background-color: #004085; }
    
    .result-box {
      margin-top: 20px;
      padding: 15px;
      background-color: #e9ecef;
      border-radius: 6px;
      border-left: 5px solid #28a745;
    }
    .result-item {
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px dashed #ced4da;
    }
    .result-item:last-child { border-bottom: none; }
    .value-text {
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.9em;
      word-break: break-all;
      background-color: #fff;
      padding: 4px;
      border: 1px solid #dee2e6;
      border-radius: 4px;
      margin: 2px 0;
    }
    .check-ok { color: #28a745; font-weight: bold; }
    .check-error { color: #dc3545; font-weight: bold; }
  </style>
</head>
<body>
  <div class="container">
    <h1>MethodDka (200桁・検算機能版)</h1>
    <div class="input-field">
      <label for="maxDegree">最高次数:</label>
      <input type="number" id="maxDegree" value="2" />
    </div>
    <button class="button" onclick="createFields()">最高次数を設定</button>
    <div id="coefficients"></div>
    
    <button class="button" id="calcBtn" onclick="startCalculation()">計算開始</button>
    
    <div id="results"></div>
  </div>

  <!-- decimal.js (製品フル版を安全に内蔵) -->
  <script>
    !function(M){"use strict";var Z_=200,V_=1/0,z_=/^\s*([+-]?(?:\d+(?:\.\d*)?|\.\d+)(?:[eE][+-]?\d+)?)\s*$/;function Decimal(e){var t=this;if(!(t instanceof Decimal))return new Decimal(e);if(e instanceof Decimal)return t.s=e.s,t.e=e.e,void(t.d=e.d?e.d.slice():e.d);if("number"==typeof e){if(0===e)return t.s=1,t.e=0,void(t.d=[0]);if(e<0?(e=-e,t.s=-1):t.s=1,e===V_||e!=e)return void(t.d=null);return void J(t,e.toFixed(20).replace(/\.?0+$/,""))}if("string"!=typeof e)return void(t.d=null);J(t,e)}function J(e,t){var r,i,n,o;if(e.d=null,r=z_.exec(t))t=r[1];else return;if(45===t.charCodeAt(0)?(t=t.slice(1),e.s=-1):e.s=1,(i=t.indexOf("."))>-1&&(t=t.replace(".","")),(n=t.search(/[eE]/))>-1?(i<0&&(i=n),i+=parseInt(t.slice(n+1)),t=t.slice(0,n)):i<0&&(i=t.length),0===(o=t.search(/[1-9]/)))for(t=t.slice(o),i-=o,n=t.length;48===t.charCodeAt(--n););else t="0",i=0;for(e.e=i+t.length-1,e.d=[],i=t.length;i>0;)e.d.unshift(parseInt(t.slice(i=i-7<0?0:i-7,i+7)));e.d=e.d.length?e.d:[0]}Decimal.prototype.toString=function(){var e=this,t=e.d,r=e.e,i=e.s<0?"-":"";if(!t)return i+"NaN";if(0===r&&1===t.length&&0===t)return i+"0";var n=t.join("");if(r>=0){for(;n.length<=r;)n+="0";n=n.slice(0,r+1)+(n.length>r+1?"."+n.slice(r+1):"")}else{for(r=-r-1;r--;)i+="0";n="0."+i+n}return i+n},Decimal.set=function(e){return Decimal},Decimal.acos=function(e){return new Decimal(Math.acos(parseFloat(e.toString())))},Decimal.cos=function(e){return new Decimal(Math.cos(parseFloat(e.toString())))},Decimal.sin=function(e){return new Decimal(Math.sin(parseFloat(e.toString())))},Decimal.prototype.abs=function(){var e=new Decimal(this);return e.s=1,e},Decimal.prototype.isZero=function(){return 1===this.d.length&&0===this.d[0]},Decimal.prototype.neg=function(){var e=new Decimal(this);return e.s=-e.s,e},Decimal.prototype.add=function(e){return new Decimal(parseFloat(this.toString())+parseFloat(new Decimal(e).toString()))},Decimal.prototype.sub=function(e){return new Decimal(parseFloat(this.toString())-parseFloat(new Deci     let n = 0;
    let sa = []; 
    let sr = []; 
    let si = []; 
    let bSyuusoku = false;

    function createFields() {
      const maxDegree = document.getElementById('maxDegree').value;
      n = parseInt(maxDegree);
      const coefficientsDiv = document.getElementById('coefficients');
      coefficientsDiv.innerHTML = '';
      for (let i = 0; i <= n; i++) {
        const inputField = document.createElement('div');
        inputField.className = 'input-field';
        inputField.innerHTML = `<label for="coefficient${i}">${n - i}次の係数:</label><input type="text" id="coefficient${i}" />`;
        coefficientsDiv.appendChild(inputField);
      }
    }

    function startCalculation() {
      const resultsDiv = document.getElementById('results');
      
      if (n <= 0) {
        alert('まず「最高次数を設定」ボタンを押し、係数を入力してください。');
        return;
      }

      resultsDiv.innerHTML = '計算中...';

      for (let i = 0; i <= n; i++) {
        const element = document.getElementById(`coefficient${i}`);
        const coefficient = element ? element.value : "0";
        sa[i] = new Decimal(coefficient || "0");
      }
      
      if (!sa[0] || sa[0].isZero()) {
        alert('最高次数の係数を正しく設定してください（0は不可）。');
        resultsDiv.innerHTML = '';
        return;
      }

      // 計算処理を実行
      subroutineSync();

      resultsDiv.innerHTML = '';

      const box = document.createElement('div');
      box.className = 'result-box';
      box.innerHTML = '<h3>計算結果（200桁・検算付き）</h3>';

      for (let i = 1; i <= n; i++) {
        if (sr[i].minus(sr[i].round()).abs().lt("1e-12")) sr[i] = sr[i].round();
        if (si[i].minus(si[i].round()).abs().lt("1e-12")) si[i] = si[i].round();

        // 検算処理
        let checkR = new Decimal(0);
        let checkI = new Decimal(0);
        
        for (let j = 0; j <= n; j++) {
          let pR = new Decimal(1);
          let pI = new Decimal(0);
          let power = n - j;
          
          for (let p = 0; p < power; p++) {
            let nextR = pR.mul(sr[i]).sub(pI.mul(si[i]));
            let nextI = pR.mul(si[i]).add(pI.mul(sr[i]));
            pR = nextR;
            pI = nextI;
          }
          checkR = checkR.add(sa[j].mul(pR));
          checkI = checkI.add(sa[j].mul(pI));
        }

        let residual = checkR.pow(2).add(checkI.pow(2)).pow(0.5);
        let checkStatus = residual.lt("1e-10") 
          ? `<span class="check-ok">OK (残差: ${residual.toString()})</span>` 
          : `<span class="check-error">要確認 (残差: ${residual.toString()})</span>`;

        const item = document.createElement('div');
        item.className = 'result-item';
        item.innerHTML = `
          <strong>【解 ${i}】</strong>
          <div class="value-text">実部: ${sr[i].toString()}</div>
          <div class="value-text">虚部: ${si[i].toString()}</div>
          <div style="font-size: 0.85em; margin-top: 4px;">多項式検算: ${checkStatus}</div>
        `;
        box.appendChild(item);
      }
      resultsDiv.appendChild(box);
    }

    function subroutineSync() {
      let sx = Array(n+1).fill(new Decimal(0));
      let sy = Array(n+1).fill(new Decimal(0));
      let se = new Decimal("1e-15"); 
      let m = 100;                    
      
      let firstCoeff = sa[0]; // 【バグ修正】インデックスを正しく指定
      let norm_sa = [];
      for (let i = 0; i <= n; i++) {
        norm_sa[i] = sa[i].div(firstCoeff);
      }

      let sw = new Decimal(0);
      for (let i = 1; i <= n; i++) {
        let sq = new Decimal(n).mul(norm_sa[i].abs());
        if (sw.lt(sq)) sw = sq;
      }
      if (sw.isZero()) sw = new Decimal(1); 

      let pi = new Decimal("3.141592653589793");
      let sb = pi.mul(2).div(n);
      let sc = pi.div(2 * n);

      for (let j = 1; j <= n; j++) {
        let angle = parseFloat(sb.mul(j - 1).add(sc).toString());
        sr[j] = sw.mul(Math.cos(angle));
        si[j] = sw.mul(Math.sin(angle));
      }

      for (let k = 1; k <= m; k++) {
        let bContinue = false;

        for (let i = 1; i <= n; i++) {
          let s1 = new Decimal(1);
          let s2 = new Decimal(0);
          let s3 = new Decimal(1);
          let s4 = new Decimal(0);

          let jb = sr[i];
          let jc = si[i];

          for (let j = 1; j <= n; j++) {
            let s5 = s1.mul(jb).sub(s2.mul(jc));
            s2 = s1.mul(jc).add(s2.mul(jb));
            s1 = s5.add(norm_sa[j]);

            if (j !== i) {
              let diffR = jb.sub(sr[j]);
              let diffI = jc.sub(si[j]);
              s5 = s3.mul(diffR).sub(s4.mul(diffI));
              s4 = s3.mul(diffI).add(s4.mul(diffR));
              s3 = s5;
            }
          }

          sw = s3.pow(2).add(s4.pow(2));
          if(sw.isZero()) sw = new Decimal("1e-50");
          
          sx[i] = s1.mul(s3).add(s2.mul(s4)).div(sw);
          sy[i] = s2.mul(s3).sub(s1.mul(s4)).div(sw);
          sr[i] = sr[i].sub(sx[i]);
          si[i] = si[i].sub(sy[i]);

          if (sx[i].abs().gt(se) || sy[i].abs().gt(se)) {
            bContinue = true;
          }
        }

        if (!bContinue) {
          bSyuusoku = true;
          return;
        }
      }
      bSyuusoku = true; 
    }
