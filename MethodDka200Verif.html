<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MethodDka - Ultra High Precision (200桁・ループカウンター版)</title>
  <style>
    body { font-family: Arial, sans-serif; }
    .container {
      max-width: 650px;
      margin: 0 auto;
      padding: 20px;
      background-color: #f9f9f9;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .input-field { margin-bottom: 10px; }
    .input-field input { width: 100%; padding: 8px; box-sizing: border-box; }
    .button {
      padding: 10px 20px;
      background-color: #0056b3;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .button:disabled { background-color: #ced4da; cursor: not-allowed; }
    .button:hover:not(:disabled) { background-color: #004085; }
    
    .status-bar {
      margin-top: 15px;
      padding: 10px;
      background-color: #e2f0d9;
      border: 1px solid #ccd1c7;
      border-radius: 4px;
      color: #385723;
      font-weight: bold;
      display: none;
    }
    
    .result-box {
      margin-top: 20px;
      padding: 15px;
      background-color: #e9ecef;
      border-radius: 6px;
      border-left: 5px solid #28a745;
    }
    .result-item {
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px dashed #ced4da;
    }
    .result-item:last-child { border-bottom: none; }
    .value-text {
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.9em;
      word-break: break-all;
      background-color: #fff;
      padding: 4px;
      border: 1px solid #dee2e6;
      border-radius: 4px;
      margin: 2px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>MethodDka (200桁・ループカウンター版)</h1>
    <div class="input-field">
      <label for="maxDegree">最高次数:</label>
      <input type="number" id="maxDegree" value="2" />
    </div>
    <button class="button" onclick="createFields()">最高次数を設定</button>
    <div id="coefficients"></div>
    
    <button class="button" id="calcBtn" onclick="startCalculation()">計算開始</button>
    
    <div id="statusBar" class="status-bar"></div>
    
    <div id="results"></div>
  </div>

  <!-- ページ下部で本物の製品版 decimal.js ライブラリを読み込み、数式ロジックを実行 -->

ecimal}(this);

    // DKA法 計算メインロジック部
    let n = 0;
    let sa = []; 
    let sr = []; 
    let si = []; 
    let bSyuusoku = false;

    function createFields() {
      const maxDegree = document.getElementById('maxDegree').value;
      n = parseInt(maxDegree);
      const coefficientsDiv = document.getElementById('coefficients');
      coefficientsDiv.innerHTML = '';
      for (let i = 0; i <= n; i++) {
        const inputField = document.createElement('div');
        inputField.className = 'input-field';
        inputField.innerHTML = `<label for="coefficient${i}">${n - i}次の係数:</label><input type="text" id="coefficient${i}" />`;
        coefficientsDiv.appendChild(inputField);
      }
    }

    const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

    async function startCalculation() {
      const calcBtn = document.getElementById('calcBtn');
      const statusBar = document.getElementById('statusBar');
      const resultsDiv = document.getElementById('results');
      
      if (n <= 0) {
        alert('まず「最高次数を設定」ボタンを押し、係数を入力してください。');
        return;
      }

      calcBtn.disabled = true;
      resultsDiv.innerHTML = '';
      statusBar.style.display = 'block';
      statusBar.innerText = '初期化中...';
      await sleep(50); 

      Decimal.set({ precision: 200 });

      for (let i = 0; i <= n; i++) {
        const element = document.getElementById(`coefficient${i}`);
        const coefficient = element ? element.value : "0";
        sa[i] = new Decimal(coefficient || "0");
      }
      
      if (!sa[0] || sa[0].isZero()) {
        alert('最高次数の係数を正しく設定してください（0は不可）。');
        calcBtn.disabled = false;
        statusBar.style.display = 'none';
        return;
      }

      await subroutineAsync();

      statusBar.style.display = 'none';
      calcBtn.disabled = false;

      if (!bSyuusoku) {
        alert('100回の反復では収束しませんでした。係数または次数を確認してください。');
      } else {
        const box = document.createElement('div');
        box.className = 'result-box';
        box.innerHTML = '<h3>計算結果（200桁高精度表示）</h3>';

        for (let i = 1; i <= n; i++) {
          if (sr[i].minus(sr[i].round()).abs().lt("1e-12")) sr[i] = sr[i].round();
          if (si[i].minus(si[i].round()).abs().lt("1e-12")) si[i] = si[i].round();

          const item = document.createElement('div');
          item.className = 'result-item';
          item.innerHTML = `
            <strong>【解 ${i}】</strong>
            <div class="value-text">実部: ${sr[i].toString()}</div>
            <div class="value-text">虚部: ${si[i].toString()}</div>
          `;
          box.appendChild(item);
        }
        resultsDiv.appendChild(box);
      }
    }

    async function subroutineAsync() {
      const statusBar = document.getElementById('statusBar');
      let sx = Array(n+1).fill(new Decimal(0));
      let sy = Array(n+1).fill(new Decimal(0));
      
      let se = new Decimal("1e-15"); 
      let m = 100;                    
      
      let sp = Decimal.acos(new Decimal(0)).mul(2);
      let sw = new Decimal(0);

      let firstCoeff = sa[0];
      let norm_sa = [];
      for (let i = 0; i <= n; i++) {
        norm_sa[i] = sa[i].div(firstCoeff);
      }

      for (let i = 1; i <= n; i++) {
        let sq = new Decimal(n).mul(norm_sa[i].abs().pow(new Decimal(1).div(new Decimal(i))));
        if (sw.lt(sq)) sw = sq;
      }
      if (sw.isZero()) sw = new Decimal(1); 

      let sb = sp.mul(2).div(n);
      let sc = sp.div(2 * n);

      for (let j = 1; j <= n; j++) {
        let st = sb.mul(j - 1).add(sc);
