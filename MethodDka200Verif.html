<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>MethodDka - 200桁超高精度版（検算機能付き）</title>
  <!-- 高精度計算ライブラリ decimal.js -->
  <script src="https://cloudflare.com"></script>
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f0f2f5; color: #333; margin: 0; padding: 20px; }
    .container {
      max-width: 750px;
      margin: 40px auto;
      padding: 30px;
      background-color: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    h1 { font-size: 24px; color: #1b5e20; margin-bottom: 20px; border-bottom: 2px solid #a5d6a7; padding-bottom: 10px; }
    .input-field { margin-bottom: 15px; }
    .input-field label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
    .input-field input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
    .button-group { margin-top: 15px; margin-bottom: 25px; }
    .button {
      padding: 10px 20px;
      background-color: #2e7d32;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      transition: background-color 0.2s;
    }
    .button:hover { background-color: #1b5e20; }
    .button.secondary { background-color: #546e7a; margin-right: 10px; }
    .button.secondary:hover { background-color: #37474f; }
    
    .result-card {
      margin-top: 20px;
      padding: 20px;
      background-color: #f1f8e9;
      border-left: 5px solid #81c784;
      border-radius: 6px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.02);
    }
    .result-title { font-size: 18px; font-weight: bold; color: #2e7d32; margin-bottom: 10px; border-bottom: 1px dashed #c8e6c9; padding-bottom: 5px; }
    .result-value { font-family: 'Courier New', Courier, monospace; word-break: break-all; background-color: #fff; padding: 8px; border: 1px solid #e0e0e0; border-radius: 4px; font-size: 13px; margin-top: 5px; }
    
    .validation-box {
      margin-top: 10px;
      padding: 10px;
      background-color: #fff3e0;
      border: 1px solid #ffe0b2;
      border-radius: 4px;
      font-size: 14px;
    }
    .validation-title { font-weight: bold; color: #e65100; }
  </style>
</head>
<body>
  <div class="container">
    <h1>MethodDka (200桁高精度多項式解法・検算機能搭載)</h1>
    <div class="input-field">
      <label for="maxDegree">最高次数 (n):</label>
      <input type="number" id="maxDegree" value="3" min="1" />
    </div>
    <div class="button-group">
      <button class="button secondary" onclick="createFields()">係数入力欄を生成</button>
    </div>
    <div id="coefficients"></div>
    <div id="calc-button-container" style="display:none;">
      <button class="button" onclick="calculate()">計算＆検算を開始</button>
    </div>
    <div id="results"></div>
  </div>

<script>
// 計算精度を200桁に設定
Decimal.set({ precision: 200 });

let n = 0;
let sa = [];      // ユーザーが入力した元の係数配列（正規化前）
let sa_norm = []; // 正規化した係数配列（計算用）
let sr = [];      // 解の実部配列
let si = [];      // 解の虚部配列
let bSyuusoku = false;

function createFields() {
  const maxDegree = document.getElementById('maxDegree').value;
  n = parseInt(maxDegree);
  if (isNaN(n) || n <= 0) {
    alert('1以上の正の整数を入力してください。');
    return;
  }
  
  const coefficientsDiv = document.getElementById('coefficients');
  coefficientsDiv.innerHTML = '';
  
  for (let i = 0; i <= n; i++) {
    const inputField = document.createElement('div');
    inputField.className = 'input-field';
    const defaultVal = (i === 0) ? "1" : (i === n ? "-1" : "0");
    inputField.innerHTML = `<label for="coefficient${i}">$x^{${n - i}}$ の係数 ($a_{${n - i}}$):</label><input type="text" id="coefficient${i}" value="${defaultVal}" />`;
    coefficientsDiv.appendChild(inputField);
  }
  document.getElementById('calc-button-container').style.display = 'block';
  document.getElementById('results').innerHTML = '';
}

function calculate() {
  sa = [];
  sr = Array(n + 1);
  si = Array(n + 1);
  
  for (let i = 0; i <= n; i++) {
    const coefficient = document.getElementById(`coefficient${i}`).value.trim();
    try {
      sa[i] = new Decimal(coefficient || "0");
    } catch(e) {
      alert(`係数 ${n - i} 次の入力が正しい数値ではありません。`);
      return;
    }
  }

  if (sa[0].isZero()) {
    alert('最高次の係数（a_n）に 0 は指定できません。');
    return;
  }

  // 計算用に正規化された係数配列をコピー
  sa_norm = [...sa];

  // 計算の実行
  subroutine();

  const resultsDiv = document.getElementById('results');
  resultsDiv.innerHTML = '';

  if (!bSyuusoku) {
    alert('指定された反復回数内で収束しませんでした。');
  } else {
    // 収束後、各解の検算を実行
    for (let i = 1; i <= n; i++) {
      // 元の多項式 P(z) に解 z = sr[i] + i*si[i] を代入して残差を求める (Horner法)
      let check_r = new Decimal(sa[0]);
      let check_i = new Decimal(0);

      for (let j = 1; j <= n; j++) {
        // (check_r + i*check_i) * (sr[i] + i*si[i]) + sa[j]
        let next_r = check_r.mul(sr[i]).sub(check_i.mul(si[i])).add(sa[j]);
        let next_i = check_r.mul(si[i]).add(check_i.mul(sr[i]));
        check_r = next_r;
        check_i = next_i;
      }

      // 残差の絶対値（誤差の大きさ）を計算: sqrt(check_r^2 + check_i^2)
      let error_abs = check_r.pow(2).add(check_i.pow(2)).sqrt();

      // UIへの結果出力
      const card = document.createElement('div');
      card.className = 'result-card';
      card.innerHTML = `
        <div class="result-title">解 ${i}</div>
        <div><strong>実部 (Real Part):</strong><div class="result-value">${sr[i].toFixed(200)}</div></div>
        <div style="margin-top:8px;"><strong>虚部 (Imaginary Part):</strong><div class="result-value">${si[i].toFixed(200)}</div></div>
        
        <div class="validation-box">
          <div class="validation-title">【200桁高精度検算（元の式に代入した結果）】</div>
          <div><strong>P(解) の実部残差:</strong> ${check_r.toExponential(10)}</div>
          <div><strong>P(解) の虚部残差:</strong> ${check_i.toExponential(10)}</div>
          <div><strong>絶対誤差（正確さの証明）:</strong> <span style="color: #d84315; font-weight:bold;">${error_abs.toExponential(5)}</span></div>
        </div>
      `;
      resultsDiv.appendChild(card);
    }
  }
}

function subroutine() {
  let sx = Array.from({length: n + 1}, () => new Decimal(0));
  let sy = Array.from({length: n + 1}, () => new Decimal(0));
  
  let se = new Decimal("1e-195"); 
  let m = 800; // パフォーマンスと精度のバランスをとった最大反復数
  
  let sp = Decimal.acos(-1); 
  let sw = new Decimal(0);

  // 最高次係数で全体を割る（a_0 を 1 に正規化）
  const a0 = sa_norm[0];
  for (let i = 0; i <= n; i++) {
    sa_norm[i] = sa_norm[i].div(a0);
  }

  // 初期値の円軌道半径 sw の計算
  for (let i = 1; i <= n; i++) {
    let q = new Decimal(1).div(new Decimal(i));
    let sq = new Decimal(n).mul(sa_norm[i].abs().pow(q));
    if (sw.lt(sq)) sw = sq;
  }
  if (sw.isZero()) sw = new Decimal(1);

  let sb = sp.mul(2).div(new Decimal(n));
  let sc = sp.div(new Decimal(2 * n));

  for (let j = 1; j <= n; j++) {
    let st = sb.mul(new Decimal(j - 1)).add(sc);
    sr[j] = sw.mul(Decimal.cos(st));
    si[j] = sw.mul(Decimal.sin(st));
  }

  // DK法のメインループ
  for (let k = 1; k <= m; k++) {
    let bContinue = false;

    for (let i = 1; i <= n; i++) {
      let s1 = new Decimal(1);
      let s2 = new Decimal(0);
      let s3 = new Decimal(1);
      let s4 = new Decimal(0);

      let bi = sr[i];
      let ci = si[i];

      for (let j = 1; j <= n; j++) {
        let s5 = s1.mul(bi).sub(s2.mul(ci));
        s2 = s1.mul(ci).add(s2.mul(bi));
        s1 = s5.add(sa_norm[j]);

        if (j !== i) {
          let dx = bi.sub(sr[j]);
          let dy = ci.sub(si[j]);
          s5 = s3.mul(dx).sub(s4.mul(dy));
          s4 = s3.mul(dy).add(s4.mul(dx));
          s3 = s5;
        }
      }

      let den;
      if (s3.abs().gte(s4.abs())) {
        let ratio = s4.div(s3);
        den = s3.add(s4.mul(ratio));
        sx[i] = s1.add(s2.mul(ratio)).div(den);
        sy[i] = s2.sub(s1.mul(ratio)).div(den);
      } else {
        let ratio = s3.div(s4);
        den = s3.mul(ratio).add(s4);
        sx[i] = s1.mul(ratio).add(s2).div(den);
        sy[i] = s2.mul(ratio).sub(s1).div(den);
      }

      sr[i] = sr[i].sub(sx[i]);
      si[i] = si[i].sub(sy[i]);

      if (sx[i].abs().gt(se) || sy[i].abs().gt(se)) {
        bContinue = true;
      }
    }

    if (!bContinue) {
      bSyuusoku = true;
      alert(`${k}回目の反復で200桁の精度に収束しました！\n直ちに自動検算を行います。`);
      return;
    }
  }

  bSyuusoku = false;
}
</script>
</body>
</html>
